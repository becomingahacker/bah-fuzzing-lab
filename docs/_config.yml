# Jekyll site configuration for the Becoming a Hacker fuzzing workshop docs.
# Rendered automatically by GitHub Pages from this folder on the docs branch
# and served at https://fuzzing.becomingahacker.com (CNAME alongside this file).

title: "Becoming a Hacker — Fuzzing Workshop"
description: >-
  Hands-on lab guide for the Becoming a Hacker fuzzing workshop.
  Each module walks you through fuzzing concepts, tooling, and exercises
  on the per-pod ubuntu-fuzzing VM in CML.
url: "https://fuzzing.becomingahacker.com"
baseurl: ""

# Theme: just-the-docs, pulled in at build time via GitHub Pages'
# jekyll-remote-theme support. Pinned to v0.12.0 for reproducibility;
# bump deliberately when there is a reason to.
# https://just-the-docs.com/
remote_theme: just-the-docs/just-the-docs@v0.12.0

# Theme features.
color_scheme: light
search_enabled: true
heading_anchors: true

# Top-right "Source on GitHub" link in the theme header.
aux_links:
  "Source on GitHub":
    - "https://github.com/becomingahacker/bah-fuzzing-lab"
aux_links_new_tab: true

# Per-page "Edit this page on GitHub" link. Sources live in /docs on the
# docs branch, so point the editor at that path.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/becomingahacker/bah-fuzzing-lab"
gh_edit_branch: "docs"
gh_edit_source: "docs"
gh_edit_view_mode: "edit"

# Markdown engine + flavor (GitHub Flavored Markdown).
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# GitHub-Pages-allow-listed plugins. jekyll-remote-theme is required to
# pull in just-the-docs from its GitHub repo at build time.
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Don't try to publish Terraform / repo files that may sneak into this
# folder via merge or stray editor save.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - "*.tf"
  - "*.tftpl"
